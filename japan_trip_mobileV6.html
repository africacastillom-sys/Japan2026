<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌸 Japón 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --sakura:#FFB7C5;--sakura-dark:#E8739A;--sakura-light:#FFF0F3;
  --indigo:#2D3A8C;--indigo-light:#EEF0FC;
  --gold:#C9922A;--gold-light:#FDF3E3;
  --matcha:#5B8A5B;--matcha-light:#E8F3E8;
  --cream:#FFFAF7;--paper:#FFF8F5;
  --ink:#2A1F1A;--ink-soft:#6B5C55;--ink-faint:#B5A49D;
  --border:#EDD9D0;--r:14px;--r-sm:10px;
  --tab-h:64px;--header-h:56px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}

@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes spin-slow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes sakura-fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes fade-up{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slide-up{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes drawer-in{from{transform:translateX(-100%)}to{transform:translateX(0)}}

html,body{height:100%;overflow:hidden;background:var(--cream)}
body{font-family:'Noto Sans JP',sans-serif;color:var(--ink);display:flex;flex-direction:column}

/* ── SAKURA ── */
.sakura-container{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden}
.petal{position:absolute;top:-20px;animation:sakura-fall linear infinite;opacity:0;user-select:none}

/* ── HEADER ── */
.header{
  height:var(--header-h);background:var(--sakura);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;flex-shrink:0;position:relative;overflow:hidden;
  border-bottom:2px solid rgba(232,115,154,.3);
}
.header::after{content:'🌸';position:absolute;right:-8px;top:-10px;font-size:48px;opacity:.15;animation:spin-slow 18s linear infinite;pointer-events:none}
.header-left{display:flex;align-items:center;gap:10px}
.menu-btn{background:none;border:none;cursor:pointer;font-size:22px;padding:4px;line-height:1}
.header-title{font-family:'Zen Maru Gothic',sans-serif;font-size:17px;font-weight:700;color:var(--indigo)}
.header-title small{display:block;font-size:10px;color:var(--sakura-dark);font-family:'Noto Sans JP',sans-serif;font-weight:500;letter-spacing:.08em;margin-top:1px}
.header-right{display:flex;gap:8px;align-items:center}
.hdr-btn{background:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.4);border-radius:20px;padding:5px 10px;font-size:12px;font-weight:600;color:var(--indigo);cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:transform .1s}
.hdr-btn:active{transform:scale(.94)}

/* ── SCREEN CONTAINER ── */
/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:6px;padding:8px 14px;background:var(--paper);border-bottom:1.5px solid var(--border);overflow-x:auto;flex-shrink:0}
.filter-bar::-webkit-scrollbar{display:none}
.filter-chip{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);background:white;font-size:12px;font-weight:600;color:var(--ink-soft);cursor:pointer;white-space:nowrap;font-family:'Noto Sans JP',sans-serif;transition:all .15s;flex-shrink:0}
.filter-chip:active{transform:scale(.94)}
.filter-chip.active{background:var(--sakura-light);border-color:var(--sakura-dark);color:var(--sakura-dark)}
.filter-chip.active-mine{background:var(--indigo-light);border-color:var(--indigo);color:var(--indigo)}
.filter-chip.active-joined{background:var(--matcha-light);border-color:var(--matcha);color:var(--matcha)}
.filter-chip-emoji{font-size:14px}
.filter-empty{text-align:center;padding:32px 16px;color:var(--ink-soft)}
.filter-empty .big{font-size:36px;margin-bottom:8px}
.filter-empty p{font-size:13px;line-height:1.6}

.screens{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;padding:14px 14px calc(var(--tab-h) + var(--safe-bottom) + 10px);display:none;background:var(--cream)}
.screen.active{display:block}
.screen::-webkit-scrollbar{display:none}

/* ── DAY HEADER ── */
.day-header{background:var(--paper);border:1.5px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.day-title{font-family:'Zen Maru Gothic',sans-serif;font-size:18px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:8px}
.city-pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;border:1.5px solid currentColor}
.day-date{font-size:11px;color:var(--ink-soft);margin-top:3px}
.day-actions{display:flex;gap:6px}
.day-action-btn{background:var(--gold-light);border:1.5px solid var(--gold);border-radius:10px;padding:6px 10px;font-size:12px;font-weight:600;color:var(--gold);cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.day-action-btn:active{transform:scale(.94)}

/* ── FLIGHT BANNER ── */
.flight-banner{background:var(--indigo-light);border:1.5px solid var(--indigo);border-radius:var(--r);padding:14px;margin-bottom:12px;position:relative;overflow:hidden}
.flight-banner::before{content:'✈';position:absolute;right:10px;top:6px;font-size:36px;opacity:.07}
.flight-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.flight-airline-badge{font-size:11px;font-weight:700;color:white;background:var(--indigo);padding:3px 10px;border-radius:20px}
.flight-nums{font-size:11px;color:var(--indigo);font-weight:500}
.flight-seg{display:flex;align-items:center;margin-bottom:8px}
.flight-seg:last-of-type{margin-bottom:0}
.seg-airport{text-align:center;min-width:52px}
.seg-iata{font-size:20px;font-weight:700;color:var(--indigo);font-family:'Zen Maru Gothic',sans-serif}
.seg-city{font-size:9px;color:var(--ink-soft)}
.seg-time{font-size:12px;font-weight:700;color:var(--ink);margin-top:2px}
.seg-connector{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:0 4px}
.seg-line{width:100%;height:1.5px;background:var(--indigo);opacity:.25}
.seg-stop-pill{font-size:9px;color:var(--indigo);font-weight:600;background:white;border:1px solid var(--indigo);border-radius:20px;padding:1px 6px;white-space:nowrap}
.flight-note{font-size:10px;color:var(--ink-soft);margin-top:10px;padding-top:8px;border-top:1px solid rgba(45,58,140,.15)}

/* ── SECTION HEADERS ── */
.section-hd{display:flex;align-items:center;gap:8px;margin:16px 0 8px}
.section-hd:first-child{margin-top:0}
.section-hd-line{flex:1;height:1px;background:var(--border)}
.section-hd-label{font-size:10px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}

/* ── ACTIVITY CARDS ── */
.act-list{display:flex;flex-direction:column;gap:6px}
.act-card{display:flex;align-items:flex-start;gap:10px;padding:11px 12px;background:white;border:1.5px solid var(--border);border-radius:var(--r);animation:fade-up .2s ease both}
.act-card:active{background:var(--sakura-light)}
.act-time{font-size:11px;font-weight:700;color:var(--ink);min-width:38px;padding-top:2px}
.act-time-dash{font-size:13px;color:var(--ink-faint);min-width:38px;padding-top:2px}
.act-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px}
.act-body{flex:1;min-width:0}
.act-name{font-size:13px;color:var(--ink);font-weight:600;line-height:1.35}
.act-note{font-size:11px;color:var(--ink-soft);margin-top:2px;line-height:1.45}
.act-del{background:none;border:none;cursor:pointer;font-size:15px;line-height:1;padding:2px;opacity:.25;transition:opacity .12s;flex-shrink:0;align-self:flex-start}
.act-del:active{opacity:1}

/* ── ADD BTN ── */
.add-inline-btn{width:100%;padding:13px;background:transparent;border:2px dashed var(--sakura);border-radius:var(--r);font-size:13px;color:var(--sakura-dark);cursor:pointer;text-align:center;font-weight:600;font-family:'Noto Sans JP',sans-serif;margin-top:8px}
.add-inline-btn:active{background:var(--sakura-light)}

/* ── WEATHER PANEL ── */
.weather-panel{background:rgba(102,126,234,.06);border:1.5px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:14px}
.weather-icon{font-size:36px;animation:float 4s ease-in-out infinite}
.weather-temp{font-size:20px;font-weight:700;font-family:'Zen Maru Gothic',sans-serif;color:var(--ink)}
.weather-desc{font-size:11px;color:var(--ink-soft);margin-top:2px}
.weather-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.weather-tag{font-size:10px;background:white;border:1px solid var(--border);border-radius:20px;padding:2px 7px;color:var(--ink-soft)}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:40px 16px;color:var(--ink-soft)}
.empty-state .big{font-size:44px;margin-bottom:10px;animation:float 3s ease-in-out infinite}
.empty-state p{font-size:13px;line-height:1.6}

/* ── BOTTOM TABS ── */
.bottom-tabs{
  height:calc(var(--tab-h) + var(--safe-bottom));
  padding-bottom:var(--safe-bottom);
  background:var(--paper);border-top:2px solid var(--border);
  display:flex;align-items:stretch;flex-shrink:0;
  position:relative;z-index:100;
}
.btab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:transparent;padding:8px 4px;transition:background .12s;font-family:'Noto Sans JP',sans-serif}
.btab:active{background:var(--sakura-light)}
.btab.active{background:var(--sakura-light)}
.btab-icon{font-size:20px;line-height:1}
.btab-label{font-size:9px;font-weight:700;color:var(--ink-soft);letter-spacing:.02em}
.btab.active .btab-label{color:var(--sakura-dark)}
.btab-badge{min-width:18px;height:18px;background:var(--sakura-dark);border-radius:20px;font-size:10px;font-weight:700;color:white;display:flex;align-items:center;justify-content:center;padding:0 4px;margin-top:-2px}

/* ── DRAWER (nav) ── */
.drawer-backdrop{position:fixed;inset:0;background:rgba(42,31,26,.4);z-index:500;display:none;backdrop-filter:blur(2px)}
.drawer-backdrop.open{display:block}
.drawer{position:fixed;top:0;left:0;bottom:0;width:280px;background:var(--paper);z-index:501;display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .25s ease;overflow:hidden}
.drawer.open{transform:translateX(0)}
.drawer-header{padding:16px;background:var(--sakura);position:relative;overflow:hidden;flex-shrink:0}
.drawer-header::after{content:'🌸';position:absolute;right:-8px;top:-8px;font-size:48px;opacity:.15;animation:spin-slow 18s linear infinite}
.drawer-title{font-family:'Zen Maru Gothic',sans-serif;font-size:17px;font-weight:700;color:var(--indigo)}
.drawer-sub{font-size:10px;color:var(--sakura-dark);margin-top:2px;letter-spacing:.08em}
.drawer-meta{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.meta-pill{font-size:10px;font-weight:500;background:rgba(255,255,255,.55);color:var(--indigo);border-radius:20px;padding:2px 8px;border:1px solid rgba(255,255,255,.4)}
.drawer-close{position:absolute;top:12px;right:14px;background:rgba(255,255,255,.5);border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;z-index:1}
.drawer-nav{flex:1;overflow-y:auto;padding:8px 8px 20px}
.drawer-nav::-webkit-scrollbar{display:none}
.nav-section-label{font-size:9px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.1em;padding:10px 10px 3px;display:flex;align-items:center;gap:5px}
.nav-section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.nav-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:var(--r-sm);cursor:pointer;margin-bottom:1px;transition:background .12s}
.nav-item:active{background:var(--sakura-light)}
.nav-item.active{background:var(--sakura-light);border:1.5px solid var(--sakura)}
.nav-emoji{font-size:15px;flex-shrink:0}
.nav-num{font-size:10px;color:var(--ink-faint);min-width:18px;font-weight:500}
.nav-label{font-size:13px;color:var(--ink);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.nav-count{font-size:10px;font-weight:700;background:var(--sakura);color:var(--indigo);border-radius:20px;padding:1px 6px;min-width:20px;text-align:center}

/* ── MODAL ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(42,31,26,.45);z-index:600;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
.modal-sheet{background:white;border-radius:20px 20px 0 0;padding:20px 18px;width:100%;max-height:90vh;overflow-y:auto;animation:slide-up .25s ease;padding-bottom:calc(20px + var(--safe-bottom))}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 16px}
.modal-title{font-family:'Zen Maru Gothic',sans-serif;font-size:17px;font-weight:700;color:var(--ink);margin-bottom:14px;display:flex;align-items:center;gap:7px}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:11px}
.field label{font-size:11px;font-weight:700;color:var(--ink-soft)}
.field input,.field textarea{font-size:14px;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);background:var(--cream);color:var(--ink);font-family:'Noto Sans JP',sans-serif;width:100%;outline:none;-webkit-appearance:none}
.field input:focus,.field textarea:focus{border-color:var(--sakura-dark)}
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:4px}
.type-option{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;border:1.5px solid var(--border);border-radius:var(--r-sm);cursor:pointer;background:var(--cream)}
.type-option:active{border-color:var(--sakura)}
.type-option.selected{border-color:var(--sakura-dark);background:var(--sakura-light)}
.type-option .te{font-size:22px}
.type-option .tl{font-size:10px;font-weight:600;color:var(--ink-soft)}
.modal-btns{display:flex;gap:8px;margin-top:14px}
.btn-ghost{flex:1;padding:12px;font-size:13px;font-weight:600;background:var(--cream);border:1.5px solid var(--border);border-radius:var(--r-sm);cursor:pointer;color:var(--ink-soft);font-family:'Noto Sans JP',sans-serif}
.btn-primary{flex:2;padding:12px;font-size:14px;font-weight:700;background:var(--sakura-dark);border:none;border-radius:var(--r-sm);cursor:pointer;color:white;font-family:'Noto Sans JP',sans-serif}
.btn-primary:active{transform:scale(.97)}

/* ── STATS BAR ── */
.stats-bar{display:flex;background:var(--paper);border-bottom:2px solid var(--border);flex-shrink:0}
.stat-cell{flex:1;padding:8px 4px;text-align:center;border-right:1px solid var(--border)}
.stat-cell:last-child{border-right:none}
.stat-emoji{font-size:14px}
.stat-val{font-size:14px;font-weight:700;color:var(--ink);font-family:'Zen Maru Gothic',sans-serif}
.stat-key{font-size:9px;color:var(--ink-soft);font-weight:500}

/* ── BUDGET SCREEN ── */
.budget-summary{background:var(--gold-light);border:1.5px solid var(--gold);border-radius:var(--r);padding:14px;margin-bottom:12px}
.budget-total-label{font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.08em}
.budget-total-val{font-family:'Zen Maru Gothic',sans-serif;font-size:26px;font-weight:700;color:var(--ink);margin:2px 0}
.budget-total-sub{font-size:11px;color:var(--ink-soft)}
.budget-bar-wrap{background:rgba(201,146,42,.15);border-radius:20px;height:8px;margin-top:10px;overflow:hidden}
.budget-bar-fill{height:100%;border-radius:20px;background:var(--gold);transition:width .5s ease}
/* ── BUDGET DASHBOARD ── */
.bdash{display:flex;flex-direction:column;gap:10px}

/* KPI cards row */
.bkpi-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.bkpi-card{background:white;border:1.5px solid var(--border);border-radius:var(--r);padding:12px 14px;position:relative;overflow:hidden}
.bkpi-card.gold{background:var(--gold-light);border-color:var(--gold)}
.bkpi-card.indigo{background:var(--indigo-light);border-color:var(--indigo)}
.bkpi-card.matcha{background:var(--matcha-light);border-color:var(--matcha)}
.bkpi-card.sakura{background:var(--sakura-light);border-color:var(--sakura)}
.bkpi-label{font-size:10px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em}
.bkpi-val{font-family:'Zen Maru Gothic',sans-serif;font-size:22px;font-weight:700;color:var(--ink);margin:2px 0}
.bkpi-sub{font-size:10px;color:var(--ink-soft)}
.bkpi-icon{position:absolute;right:10px;top:10px;font-size:22px;opacity:.25}

/* Progress bar */
.bprogress-card{background:white;border:1.5px solid var(--border);border-radius:var(--r);padding:14px}
.bprogress-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px}
.bprogress-title{font-size:12px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em}
.bprogress-pct{font-family:'Zen Maru Gothic',sans-serif;font-size:20px;font-weight:700;color:var(--ink)}
.bprogress-track{height:10px;background:#f0e8e0;border-radius:20px;overflow:hidden;margin-bottom:6px}
.bprogress-fill{height:100%;border-radius:20px;transition:width .6s ease;background:linear-gradient(90deg,var(--gold),#e8a030)}
.bprogress-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--ink-faint)}

/* Category donut-style bars */
.bcats-card{background:white;border:1.5px solid var(--border);border-radius:var(--r);padding:14px}
.bcats-title{font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.bcat-dash-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bcat-dash-row:last-child{margin-bottom:0}
.bcat-dash-em{font-size:16px;width:24px;text-align:center;flex-shrink:0}
.bcat-dash-info{flex:1;min-width:0}
.bcat-dash-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.bcat-dash-name{font-size:12px;font-weight:600;color:var(--ink)}
.bcat-dash-amt{font-size:12px;font-weight:700;color:var(--ink);flex-shrink:0}
.bcat-dash-track{height:6px;background:#f0e8e0;border-radius:20px;overflow:hidden}
.bcat-dash-fill{height:100%;border-radius:20px;transition:width .5s}
.bcat-dash-pct{font-size:10px;color:var(--ink-faint);margin-top:1px}

/* Items table */
.bitems-card{background:white;border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.bitems-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border)}
.bitems-title{font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em}
.bitems-count{font-size:10px;font-weight:700;background:var(--sakura);color:var(--indigo);border-radius:20px;padding:2px 8px}
.bitem-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);transition:background .12s}
.bitem-row:last-of-type{border-bottom:none}
.bitem-row:active{background:var(--cream)}
.bitem-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.bitem-body{flex:1;min-width:0}
.bitem-name{font-size:13px;color:var(--ink);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bitem-cat{font-size:10px;color:var(--ink-faint);margin-top:1px}
.bitem-amt{font-size:13px;font-weight:700;color:var(--ink);flex-shrink:0}
.bitem-pp{font-size:10px;color:var(--ink-faint);text-align:right;margin-top:1px}
.bitem-del{background:none;border:none;cursor:pointer;font-size:14px;opacity:.2;padding:4px;flex-shrink:0}
.bitem-del:active{opacity:1}

/* Edit amount inline */
.bitem-amt-inp{width:72px;font-size:13px;font-weight:700;padding:4px 6px;border:1.5px solid var(--gold);border-radius:6px;text-align:right;font-family:'Noto Sans JP',sans-serif;outline:none;-webkit-appearance:none;background:var(--gold-light);color:var(--ink)}

/* Add form */
.badd-card{background:var(--paper);border:2px dashed var(--border);border-radius:var(--r);padding:14px}
.badd-title{font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.badd-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.b-inp{font-size:13px;padding:9px 10px;border:1.5px solid var(--border);border-radius:var(--r-sm);background:white;color:var(--ink);font-family:'Noto Sans JP',sans-serif;outline:none;-webkit-appearance:none;width:100%}
.b-inp:focus{border-color:var(--gold)}
.b-select{font-size:13px;padding:9px 10px;border:1.5px solid var(--border);border-radius:var(--r-sm);background:white;color:var(--ink);font-family:'Noto Sans JP',sans-serif;outline:none;width:100%}
.badd-row{display:flex;gap:6px}
.b-add-btn{padding:10px 16px;background:var(--gold);border:none;border-radius:var(--r-sm);cursor:pointer;font-size:13px;font-weight:700;color:white;font-family:'Noto Sans JP',sans-serif;white-space:nowrap;flex-shrink:0}
.b-add-btn:active{transform:scale(.96)}

/* Budget total editable */
.btotal-edit{display:flex;align-items:center;gap:6px;margin-top:6px}
.btotal-edit-label{font-size:11px;color:var(--ink-soft)}
.btotal-inp{width:90px;font-size:14px;font-weight:700;padding:5px 8px;border:1.5px solid var(--gold);border-radius:8px;text-align:right;font-family:'Zen Maru Gothic',sans-serif;outline:none;background:white;color:var(--ink);-webkit-appearance:none}

.bpersons-label{font-size:11px;font-weight:700;color:var(--ink-soft);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.bpersons-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.bperson-chip{font-size:12px;font-weight:600;padding:5px 10px;border-radius:20px;border:1.5px solid var(--border);background:white;color:var(--ink-soft);cursor:pointer;transition:all .12s;font-family:'Noto Sans JP',sans-serif;user-select:none}
.bperson-chip:active{transform:scale(.93)}
.bperson-chip.selected{background:var(--indigo-light);border-color:var(--indigo);color:var(--indigo)}
.bperson-chip.all-sel{background:var(--matcha-light);border-color:var(--matcha);color:var(--matcha)}
.bitem-persons{font-size:10px;color:var(--ink-faint);margin-top:2px}
.budget-add-form{background:var(--paper);border:1.5px dashed var(--border);border-radius:var(--r);padding:12px;margin-bottom:10px}
.budget-add-title{font-size:11px;font-weight:700;color:var(--ink-soft);margin-bottom:8px}
.b-row{display:flex;gap:6px;margin-bottom:6px}
.b-add-btn-old{padding:9px 14px;background:var(--gold);border:none;border-radius:var(--r-sm);cursor:pointer;font-size:13px;font-weight:700;color:white;font-family:'Noto Sans JP',sans-serif;white-space:nowrap}

/* ── CSV IMPORTER ── */
.bcsv-card{background:var(--indigo-light);border:2px dashed var(--indigo);border-radius:var(--r);padding:14px}
.bcsv-title{font-size:11px;font-weight:700;color:var(--indigo);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.bcsv-desc{font-size:11px;color:var(--indigo);opacity:.85;margin-bottom:8px;line-height:1.5}
.bcsv-steps{font-size:11px;color:var(--indigo);opacity:.75;margin-bottom:10px;padding-left:14px;line-height:1.8}
.bcsv-upload-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:11px;background:var(--indigo);border:none;border-radius:var(--r-sm);cursor:pointer;font-size:13px;font-weight:700;color:white;font-family:'Noto Sans JP',sans-serif}
.bcsv-upload-btn:active{transform:scale(.97)}
.bcsv-file-inp{display:none}
.bcsv-result{margin-top:10px;padding:10px 12px;border-radius:var(--r-sm);font-size:12px;font-weight:600;line-height:1.6}
.bcsv-result.ok{background:var(--matcha-light);color:var(--matcha);border:1.5px solid var(--matcha)}
.bcsv-result.err{background:var(--sakura-light);color:var(--sakura-dark);border:1.5px solid var(--sakura)}

/* ── PACKING SCREEN ── */
.pack-summary{background:var(--sakura-light);border:1.5px solid var(--sakura);border-radius:var(--r);padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:12px}
.pack-sum-emoji{font-size:28px;animation:float 3s ease-in-out infinite}
.pack-pct{font-family:'Zen Maru Gothic',sans-serif;font-size:24px;font-weight:700;color:var(--sakura-dark)}
.pack-str{font-size:11px;color:var(--ink-soft);margin-top:2px}
.pack-bar-wrap{flex:1;height:8px;background:rgba(232,115,154,.2);border-radius:20px;overflow:hidden}
.pack-bar-fill{height:100%;background:var(--sakura-dark);border-radius:20px;transition:width .5s}
.pack-cat-block{background:white;border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:8px}
.pack-cat-hd{display:flex;align-items:center;gap:8px;padding:12px 12px;cursor:pointer}
.pack-cat-hd:active{background:var(--sakura-light)}
.pack-cat-em{font-size:16px}
.pack-cat-name{font-size:13px;font-weight:700;color:var(--ink);flex:1}
.pack-cat-prog{font-size:11px;color:var(--ink-faint);font-weight:500}
.pack-cat-arrow{font-size:12px;color:var(--ink-faint);transition:transform .2s}
.pack-cat-arrow.open{transform:rotate(90deg)}
.pack-items{border-top:1px solid var(--border);padding:6px 10px}
.pack-item{display:flex;align-items:center;gap:10px;padding:9px 6px;border-radius:8px}
.pack-item:active{background:var(--sakura-light)}
.pack-cb{width:18px;height:18px;accent-color:var(--sakura-dark);cursor:pointer;flex-shrink:0}
.pack-item-label{font-size:13px;color:var(--ink);flex:1;cursor:pointer;line-height:1.4}
.pack-item-label.done{color:var(--ink-faint);text-decoration:line-through}
.pack-item-del{background:none;border:none;cursor:pointer;font-size:14px;opacity:.2;padding:4px}
.pack-item-del:active{opacity:1}
.pack-add-row{display:flex;gap:6px;padding:8px 8px 6px;border-top:1px solid var(--border)}
.pack-add-inp{flex:1;font-size:13px;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;background:var(--cream);color:var(--ink);font-family:'Noto Sans JP',sans-serif;outline:none;-webkit-appearance:none}
.pack-add-inp:focus{border-color:var(--sakura-dark)}
.pack-add-btn{padding:8px 13px;background:var(--sakura-dark);border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;color:white;font-family:'Noto Sans JP',sans-serif}

/* ── NOTES SCREEN ── */
.note-card{background:white;border:1.5px solid var(--border);border-radius:var(--r);padding:12px 13px;margin-bottom:8px;animation:fade-up .2s ease}
.note-card:hover{border-color:var(--sakura)}
.note-card-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.note-emoji-pick{font-size:20px;cursor:pointer}
.note-title-inp{flex:1;font-size:14px;font-weight:700;border:none;background:transparent;color:var(--ink);font-family:'Zen Maru Gothic',sans-serif;outline:none;-webkit-appearance:none}
.note-title-inp::placeholder{color:var(--ink-faint)}
.note-date{font-size:10px;color:var(--ink-faint);flex-shrink:0}
.note-del{background:none;border:none;cursor:pointer;font-size:15px;opacity:.25;padding:2px}
.note-del:active{opacity:1}
.note-body-inp{width:100%;font-size:13px;border:none;background:transparent;color:var(--ink-soft);font-family:'Noto Sans JP',sans-serif;outline:none;resize:none;line-height:1.6;min-height:60px;-webkit-appearance:none}
.note-body-inp::placeholder{color:var(--ink-faint)}
.note-add-btn{width:100%;padding:13px;background:transparent;border:2px dashed var(--border);border-radius:var(--r);font-size:13px;color:var(--ink-soft);cursor:pointer;text-align:center;font-weight:600;font-family:'Noto Sans JP',sans-serif;margin-top:4px}
.note-add-btn:active{background:var(--sakura-light);border-color:var(--sakura)}

.screen-section-title{font-size:10px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.screen-section-title::after{content:'';flex:1;height:1px;background:var(--border)}

.info-pill{background:var(--indigo-light);border:1.5px solid var(--indigo);border-radius:var(--r-sm);padding:8px 10px;font-size:11px;color:var(--indigo);margin-top:8px}

/* ── WELCOME SCREEN ── */
.welcome-overlay{position:fixed;inset:0;background:var(--sakura);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px;gap:0;overflow:hidden}
.welcome-overlay.hidden{display:none!important}
.welcome-logo{font-size:56px;margin-bottom:8px;animation:float 3s ease-in-out infinite}
.welcome-title{font-family:'Zen Maru Gothic',sans-serif;font-size:24px;font-weight:700;color:var(--indigo);text-align:center}
.welcome-sub{font-size:13px;color:var(--sakura-dark);margin-top:4px;margin-bottom:28px;text-align:center;letter-spacing:.06em}
.welcome-card{background:white;border-radius:20px;padding:22px 20px;width:100%;max-width:340px;box-shadow:0 8px 32px rgba(232,115,154,.2);overflow:hidden}
.welcome-label{font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.welcome-name-row{display:flex;gap:8px;margin-bottom:14px;min-width:0}
.welcome-emoji-btn{font-size:28px;background:var(--cream);border:1.5px solid var(--border);border-radius:12px;width:52px;height:52px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.welcome-name-inp{flex:1;min-width:0;font-size:16px;padding:12px 14px;border:1.5px solid var(--border);border-radius:12px;background:var(--cream);color:var(--ink);font-family:'Noto Sans JP',sans-serif;outline:none;-webkit-appearance:none;width:100%}
.welcome-name-inp:focus{border-color:var(--sakura-dark)}
.emoji-picker{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.emoji-opt{font-size:22px;background:var(--cream);border:1.5px solid var(--border);border-radius:10px;width:42px;height:42px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.emoji-opt:active{transform:scale(.9)}
.emoji-opt.selected{border-color:var(--sakura-dark);background:var(--sakura-light)}
.welcome-enter-btn{width:100%;padding:14px;background:var(--sakura-dark);border:none;border-radius:12px;font-size:15px;font-weight:700;color:white;font-family:'Noto Sans JP',sans-serif;cursor:pointer;margin-top:4px}
.welcome-enter-btn:active{transform:scale(.97)}

/* ── USER AVATAR (header) ── */
.user-avatar{width:30px;height:30px;border-radius:50%;background:white;border:2px solid rgba(255,255,255,.6);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;flex-shrink:0}

/* ── ACTIVITY CARD SOCIAL ── */
.act-social{display:flex;align-items:center;gap:8px;margin-top:7px;padding-top:7px;border-top:1px solid var(--border)}
.act-author{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--ink-faint);flex:1}
.act-author-avatar{font-size:13px}
.act-author-name{font-weight:600;color:var(--ink-soft)}
.act-interested{display:flex;align-items:center;gap:4px}
.act-avatars{display:flex;gap:2px}
.act-avatar-chip{font-size:14px;line-height:1}
.join-btn{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;border:1.5px solid;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .12s;white-space:nowrap}
.join-btn:active{transform:scale(.94)}
.join-btn.joined{background:var(--matcha-light);color:var(--matcha);border-color:var(--matcha)}
.join-btn.not-joined{background:var(--sakura-light);color:var(--sakura-dark);border-color:var(--sakura)}

.hidden{display:none!important}
</style>
</head>
<body>

<div class="sakura-container" id="sakuraContainer"></div>

<!-- WELCOME SCREEN -->
<div class="welcome-overlay" id="welcomeOverlay">
  <div class="welcome-logo">🌸</div>
  <div class="welcome-title">Japón 2026</div>
  <div class="welcome-sub">日本旅行 — ¿Quién eres?</div>
  <div class="welcome-card">
    <div class="welcome-label">Elige tu emoji</div>
    <div class="emoji-picker" id="emojiPicker"></div>
    <div class="welcome-label">Tu nombre</div>
    <div class="welcome-name-row">
      <div class="welcome-emoji-btn" id="selectedEmojiPreview">🌸</div>
      <input class="welcome-name-inp" id="welcomeNameInp" type="text" placeholder="ej. África, Nacho..." maxlength="20" onkeydown="if(event.key==='Enter')enterApp()">
    </div>
    <button class="welcome-enter-btn" onclick="enterApp()">¡Entrar al viaje! 🚀</button>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <button class="menu-btn" onclick="openDrawer()">☰</button>
    <div class="header-title">
      🌸 Japón 2026
      <small>日本旅行 · 10–28 sep</small>
    </div>
  </div>
  <div class="header-right">
    <button class="hdr-btn" onclick="toggleWeather()">🌤️</button>
    <div class="user-avatar" id="headerAvatar" onclick="changeUser()" title="Cambiar usuario">🌸</div>
    <button class="hdr-btn" onclick="openModal()" style="background:var(--sakura-dark);color:white;border-color:var(--sakura-dark)">✨ Añadir</button>
  </div>
</div>

<!-- STATS BAR -->
<div class="stats-bar">
  <div class="stat-cell"><div class="stat-emoji">⭐</div><div class="stat-val" id="sAct">0</div><div class="stat-key">actividades</div></div>
  <div class="stat-cell"><div class="stat-emoji">💴</div><div class="stat-val" id="sBudget">—</div><div class="stat-key">gastado</div></div>
  <div class="stat-cell"><div class="stat-emoji">🧳</div><div class="stat-val" id="sPack">0%</div><div class="stat-key">maleta</div></div>
  <div class="stat-cell" onclick="celebrar()" style="cursor:pointer"><div class="stat-emoji" style="animation:float 2s ease-in-out infinite">🎉</div><div class="stat-val" style="font-size:10px;margin-top:1px">kampai</div><div class="stat-key">乾杯</div></div>
</div>

<!-- FILTER BAR -->
<div class="filter-bar" id="filterBar">
  <button class="filter-chip active" id="filterAll" onclick="setFilter('all',this)">
    <span class="filter-chip-emoji">📅</span> Todos
  </button>
  <button class="filter-chip" id="filterMine" onclick="setFilter('mine',this)">
    <span class="filter-chip-emoji" id="filterMineEmoji">👤</span> Mis planes
  </button>
  <button class="filter-chip" id="filterJoined" onclick="setFilter('joined',this)">
    <span class="filter-chip-emoji">✅</span> Me apunto
  </button>
</div>

<!-- SCREENS -->
<div class="screens">
  <div class="screen active" id="screen-itinerary"></div>
  <div class="screen" id="screen-budget"></div>
  <div class="screen" id="screen-packing"></div>
  <div class="screen" id="screen-notes"></div>
</div>

<!-- BOTTOM TABS -->
<div class="bottom-tabs">
  <button class="btab active" onclick="switchScreen('itinerary',this)">
    <span class="btab-icon">📅</span>
    <span class="btab-label">Itinerario</span>
  </button>
  <button class="btab" onclick="switchScreen('budget',this)">
    <span class="btab-icon">💴</span>
    <span class="btab-label">Budget</span>
  </button>
  <button class="btab" onclick="switchScreen('packing',this)">
    <span class="btab-icon">🧳</span>
    <span class="btab-label">Maleta</span>
  </button>
  <button class="btab" onclick="switchScreen('notes',this)">
    <span class="btab-icon">📝</span>
    <span class="btab-label">Notas</span>
  </button>
</div>

<!-- DRAWER -->
<div class="drawer-backdrop" id="drawerBackdrop" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
    <div class="drawer-title">🌸 Japón 2026</div>
    <div class="drawer-sub">日本旅行 — Nuestro viaje soñado</div>
    <div class="drawer-meta">
      <span class="meta-pill">📅 10–28 sep</span>
      <span class="meta-pill">👥 6 personas</span>
      <span class="meta-pill">✈️ Air China</span>
    </div>
  </div>
  <div class="drawer-nav" id="drawerNav"></div>
</div>

<!-- ADD MODAL (bottom sheet) -->
<div class="modal-backdrop hidden" id="modalWrap">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">✨ Nueva actividad</div>
    <div class="field">
      <label>¿Qué tipo de actividad?</label>
      <div class="type-grid" id="typeGrid"></div>
    </div>
    <div class="field"><label>⏰ Hora (opcional)</label><input id="fTime" type="text" placeholder="ej. 10:00" inputmode="numeric"></div>
    <div class="field"><label>📝 Nombre</label><input id="fName" type="text" placeholder="ej. Templo Senso-ji 🛕"></div>
    <div class="field"><label>💬 Notas</label><textarea id="fNote" rows="2" placeholder="Reserva, precio, enlace..."></textarea></div>
    <div class="modal-btns">
      <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveAct()">💾 Guardar</button>
    </div>
  </div>
</div>

<script>
/* ── SAKURA ── */
function spawnPetals(n=6){
  const c=document.getElementById('sakuraContainer');
  for(let i=0;i<n;i++){
    const p=document.createElement('div');p.className='petal';
    p.textContent=['🌸','🌺','🍃','🌼'][Math.floor(Math.random()*4)];
    p.style.left=Math.random()*100+'vw';
    p.style.fontSize=(10+Math.random()*12)+'px';
    p.style.animationDuration=(4+Math.random()*5)+'s';
    p.style.animationDelay=(Math.random()*2)+'s';
    p.style.opacity='0';
    c.appendChild(p);setTimeout(()=>p.remove(),9000);
  }
}
spawnPetals(10);setInterval(()=>spawnPetals(2),5000);

function celebrar(){
  const em=['🎊','🎉','🌸','🍜','🗾','🏯','🦊','🎋','🍡','⛩️'];
  const c=document.getElementById('sakuraContainer');
  for(let i=0;i<25;i++){
    const p=document.createElement('div');p.className='petal';
    p.textContent=em[Math.floor(Math.random()*em.length)];
    p.style.left=Math.random()*100+'vw';p.style.fontSize=(14+Math.random()*12)+'px';
    p.style.animationDuration=(2+Math.random()*3)+'s';p.style.animationDelay=(Math.random()*1)+'s';
    p.style.opacity='0';c.appendChild(p);setTimeout(()=>p.remove(),5000);
  }
}

/* ── USER IDENTITY ── */
const USER_EMOJIS=['🌸','🦊','🐉','⛩️','🍜','🎋','🌺','🎌','🏯','🗼','🌊','🎎'];
let currentUser = null; // {name, emoji}

function initWelcome(){
  // Build emoji picker
  const picker = document.getElementById('emojiPicker');
  USER_EMOJIS.forEach((em,i)=>{
    const btn = document.createElement('button');
    btn.className='emoji-opt'+(i===0?' selected':'');
    btn.textContent=em;
    btn.onclick=()=>{
      document.querySelectorAll('.emoji-opt').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      document.getElementById('selectedEmojiPreview').textContent=em;
    };
    picker.appendChild(btn);
  });
  // Check if already has identity saved
  try{
    const saved=JSON.parse(localStorage.getItem('japan2026_user')||'null');
    if(saved&&saved.name){
      currentUser=saved;
      document.getElementById('welcomeOverlay').classList.add('hidden');
      document.getElementById('headerAvatar').textContent=saved.emoji;
      updateFilterBar();
    }
  }catch(e){}
}

function enterApp(){
  const name=document.getElementById('welcomeNameInp').value.trim();
  if(!name){document.getElementById('welcomeNameInp').focus();return;}
  const emoji=document.querySelector('.emoji-opt.selected')?.textContent||'🌸';
  currentUser={name,emoji};
  try{localStorage.setItem('japan2026_user',JSON.stringify(currentUser));}catch(e){}
  document.getElementById('welcomeOverlay').classList.add('hidden');
  document.getElementById('headerAvatar').textContent=emoji;
  updateFilterBar();
  spawnPetals(15);
}

function changeUser(){
  if(confirm(`¿Cambiar de usuario? (Actualmente: ${currentUser?.emoji} ${currentUser?.name})`)){
    currentUser=null;
    try{localStorage.removeItem('japan2026_user');}catch(e){}
    document.getElementById('welcomeOverlay').classList.remove('hidden');
    document.getElementById('welcomeNameInp').value='';
  }
}

/* ── VOTING ── */
function toggleJoin(dayId, actId){
  if(!currentUser){alert('Primero elige tu nombre 👆');return;}
  const day=DAYS[dayId];
  const act=day?.acts.find(a=>a.id===actId);
  if(!act)return;
  if(!act.interested)act.interested=[];
  const idx=act.interested.findIndex(u=>u.name===currentUser.name);
  if(idx>=0){
    act.interested.splice(idx,1);
  } else {
    act.interested.push({name:currentUser.name,emoji:currentUser.emoji});
    spawnPetals(3);
  }
  save();renderItinerary();
}
let currentScreen='itinerary';
function switchScreen(name,btn){
  currentScreen=name;
  document.querySelectorAll('.btab').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  if(name==='budget')renderBudget();
  if(name==='packing')renderPacking();

/* ── SYNC ENGINE ── */
const LS = 'japan2026_';
let saveTimer = null;
let isSaving = false;
let lastSavedHash = '';

function getState(){
  return {
    acts: DAYS.map(d=>d.acts),
    idSeq,
    budget, budgetIdSeq,
    pack: packData.map(c=>({id:c.id,items:c.items,open:c.open})),
    packIdSeq,
    notes, noteIdSeq,
  };
}

function applyState(s){
  if(!s) return;
  if(s.acts) s.acts.forEach((a,i)=>{if(DAYS[i]) DAYS[i].acts=a});
  if(s.idSeq) idSeq=s.idSeq;
  if(s.budget){budget=s.budget; budgetIdSeq=s.budgetIdSeq||budgetIdSeq;}
  if(s.pack){s.pack.forEach(saved=>{const c=packData.find(c=>c.id===saved.id);if(c){c.items=saved.items;c.open=saved.open;}});if(s.packIdSeq)packIdSeq=s.packIdSeq;}
  if(s.notes){notes=s.notes; noteIdSeq=s.noteIdSeq||noteIdSeq;}
}

/* Guarda en localStorage siempre, y en JSONBin si está configurado */
function save(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    const state = getState();
    const json  = JSON.stringify(state);

    // 1. Siempre guardar en localStorage (backup local)
    try{ localStorage.setItem(LS+'state', json); }catch(e){}

    // 2. Si JSONBin está configurado, subir a la nube
    if(!JSONBIN_ID || !JSONBIN_KEY) return;
    if(json === lastSavedHash) return; // nada cambió
    if(isSaving) return;
    isSaving = true;
    showSyncBadge('saving');
    try{
      const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}`, {
        method: 'PUT',
        headers: {'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY,'X-Bin-Versioning':'false'},
        body: json
      });
      if(r.ok){ lastSavedHash=json; showSyncBadge('ok'); }
      else     { showSyncBadge('error'); }
    }catch(e){ showSyncBadge('error'); }
    finally  { isSaving=false; }
  }, 800); // debounce — espera 800ms antes de guardar
}

async function loadSaved(){
  // Intentar cargar desde JSONBin primero
  if(JSONBIN_ID && JSONBIN_KEY){
    try{
      showSyncBadge('loading');
      const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}/latest`,{
        headers:{'X-Master-Key':JSONBIN_KEY}
      });
      if(r.ok){
        const data = await r.json();
        applyState(data.record);
        lastSavedHash = JSON.stringify(data.record);
        showSyncBadge('ok');
        return;
      }
    }catch(e){}
    showSyncBadge('error');
  }
  // Fallback: cargar desde localStorage
  try{
    const raw = localStorage.getItem(LS+'state');
    if(raw) applyState(JSON.parse(raw));
  }catch(e){}
}

/* ── SPLITWISE CSV IMPORTER ── */
// Splitwise CSV columns (English export):
// Date, Description, Category, Cost, Currency, África, Davide, Dani, Giorgia, Carlos, Jordi
const SW_CAT_MAP={
  'Lodging':'hoteles','Accommodation':'hoteles','Hotel':'hoteles',
  'Transportation':'transporte','Taxi':'transporte','Flight':'vuelos','Flights':'vuelos','Plane':'vuelos','Train':'transporte','Bus':'transporte',
  'Food and drink':'comidas','Groceries':'comidas','Restaurant':'comidas','Dining out':'comidas',
  'Entertainment':'visitas','Sightseeing':'visitas','Activities':'visitas','Tourism':'visitas',
  'Shopping':'compras','General':'otros','Utilities':'otros','Other':'otros'
};
function guessCategory(swCat){
  if(!swCat) return 'otros';
  for(const[k,v] of Object.entries(SW_CAT_MAP)){
    if(swCat.toLowerCase().includes(k.toLowerCase())) return v;
  }
  return 'otros';
}
function parseCSVLine(line){
  const result=[];let cur='';let inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){result.push(cur.trim());cur='';}
    else{cur+=c;}
  }
  result.push(cur.trim());
  return result;
}
function importSplitwiseCSV(input){
  const file=input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const text=e.target.result;
      const lines=text.split('\n').filter(l=>l.trim());
      if(lines.length<2){showCSVResult('err','El archivo está vacío o no tiene datos.');return;}

      // Parse header
      const headers=parseCSVLine(lines[0]).map(h=>h.replace(/['"]/g,'').trim());
      const iDesc=headers.findIndex(h=>h.toLowerCase().includes('description'));
      const iCat=headers.findIndex(h=>h.toLowerCase().includes('category'));
      const iCost=headers.findIndex(h=>h.toLowerCase().includes('cost'));

      if(iDesc<0||iCost<0){
        showCSVResult('err','No se reconoce el formato. ¿Es un CSV exportado de Splitwise en inglés?');return;
      }

      // Find person columns — match against VIAJEROS names (case-insensitive, partial match)
      const personCols=VIAJEROS.map(name=>{
        const idx=headers.findIndex(h=>h.toLowerCase().includes(name.toLowerCase())||name.toLowerCase().includes(h.toLowerCase()));
        return{name,idx};
      }).filter(p=>p.idx>=0);

      let imported=0,skipped=0;
      for(let i=1;i<lines.length;i++){
        const cols=parseCSVLine(lines[i]);
        if(cols.length<3) continue;
        const desc=(cols[iDesc]||'').replace(/['"]/g,'').trim();
        const costRaw=(cols[iCost]||'').replace(/['"€$,\s]/g,'');
        const cost=parseFloat(costRaw);
        if(!desc||isNaN(cost)||cost<=0){skipped++;continue;}

        // Which persons are involved (have a non-zero value in their column)
        let persons=personCols.filter(p=>{
          const v=parseFloat((cols[p.idx]||'').replace(/['"€$,\s]/g,''));
          return !isNaN(v)&&v!==0;
        }).map(p=>p.name);
        if(persons.length===0) persons=[...VIAJEROS]; // fallback: everyone

        const cat=guessCategory(iCat>=0?(cols[iCat]||''):'');
        budget.items.push({id:budgetIdSeq++,cat,name:desc,amount:Math.round(cost*100)/100,persons});
        imported++;
      }

      if(imported===0){
        showCSVResult('err',`No se pudo importar ningún gasto. ${skipped} filas omitidas.`);
      } else {
        save();renderBudget();
        showCSVResult('ok',`✅ ${imported} gastos importados correctamente${skipped>0?` (${skipped} omitidos)`:''}.\n¡Ya aparecen en el desglose!`);
        spawnPetals(8);
      }
    }catch(err){
      showCSVResult('err','Error al leer el archivo: '+err.message);
    }
    input.value=''; // reset so same file can be re-imported
  };
  reader.readAsText(file);
}
function showCSVResult(type,msg){
  const el=document.getElementById('csvResult');
  if(!el) return;
  el.className='bcsv-result '+type;
  el.textContent=msg;
  if(type==='ok') setTimeout(()=>{if(el)el.textContent='';},5000);
}

  if(showWeather)html+=weatherHTML(d.city);
  if(d.flight)html+=flightHTML(FLIGHTS[d.flight]);
  const sec={};
  const filteredActs=filterActs(d.acts);
  filteredActs.forEach(a=>{if(!sec[a.type])sec[a.type]=[];sec[a.type].push(a)});
  let hasContent=false;
  TYPE_ORDER.forEach(type=>{
    if(!sec[type])return;hasContent=true;
    html+=`<div class="section-hd"><div class="section-hd-line"></div><div class="section-hd-label">${SECTION_LABELS[type]}</div><div class="section-hd-line"></div></div><div class="act-list">`;
    sec[type].forEach((a,ai)=>{
      const m=TYPE_META[a.type]||TYPE_META.visita;
      const interested=a.interested||[];
      const iJoined=currentUser&&interested.some(u=>u.name===currentUser.name);
      const avatars=interested.map(u=>`<span class="act-avatar-chip" title="${u.name}">${u.emoji}</span>`).join('');
      const authorRow=a.author
        ?`<div class="act-social">
            <div class="act-author"><span class="act-author-avatar">${a.author.emoji}</span><span class="act-author-name">${a.author.name}</span></div>
            <div class="act-interested">
              ${interested.length>0?`<div class="act-avatars">${avatars}</div>`:''}
              <button class="join-btn ${iJoined?'joined':'not-joined'}" onclick="toggleJoin(${d.id},${a.id})">${iJoined?'✓ Apuntado':'+ Me apunto'}</button>
            </div>
          </div>`
        :`<div class="act-social">
            <div class="act-author" style="color:var(--border);font-style:italic;font-size:10px">plan base del viaje</div>
            <div class="act-interested">
              ${interested.length>0?`<div class="act-avatars">${avatars}</div>`:''}
              <button class="join-btn ${iJoined?'joined':'not-joined'}" onclick="toggleJoin(${d.id},${a.id})">${iJoined?'✓ Apuntado':'+ Me apunto'}</button>
            </div>
          </div>`;
      html+=`<div class="act-card" style="animation-delay:${ai*0.04}s">
        ${a.time?`<div class="act-time">${a.time}</div>`:`<div class="act-time-dash">—</div>`}
        <div class="act-icon" style="background:${m.bg}">${m.emoji}</div>
        <div class="act-body">
          <div class="act-name">${a.name}</div>
          ${a.note?`<div class="act-note">${a.note}</div>`:''}
          ${authorRow}
        </div>
        <button class="act-del" onclick="delAct(${d.id},${a.id})">🗑️</button>
      </div>`;
    });
    html+='</div>';
  });
  if(!d.flight&&!hasContent){
    if(activeFilter==='mine'){
      html+=`<div class="filter-empty"><div class="big">✏️</div><p>No has añadido ningún plan para este día.<br>¡Pulsa <strong>✨ Añadir</strong> para proponer algo!</p></div>`;
    } else if(activeFilter==='joined'){
      html+=`<div class="filter-empty"><div class="big">🔍</div><p>No te has apuntado a ningún plan este día.<br>Vuelve a <strong>Todos</strong> para ver qué propone el grupo.</p></div>`;
    } else {
      html+=`<div class="empty-state"><div class="big">🎋</div><p>Día libre como el viento...<br>¡Pulsa <strong>✨ Añadir</strong> para planificar!</p></div>`;
    }
  }
  html+=`<button class="add-inline-btn" onclick="openModal()">✨ Añadir actividad ✨</button>`;
  document.getElementById('screen-itinerary').innerHTML=html;
  let total=0;DAYS.forEach(d=>total+=d.acts.length);
  document.getElementById('sAct').textContent=total;
}

function toggleWeather(){showWeather=!showWeather;renderItinerary()}
function openModal(){
  selectedType='visita';
  document.getElementById('fTime').value='';document.getElementById('fName').value='';document.getElementById('fNote').value='';
  buildTypeGrid();document.getElementById('modalWrap').classList.remove('hidden');
}
function closeModal(){document.getElementById('modalWrap').classList.add('hidden')}
function saveAct(){
  const name=document.getElementById('fName').value.trim();if(!name)return;
  DAYS[sel].acts.push({
    id:idSeq++,type:selectedType,
    time:document.getElementById('fTime').value.trim(),
    name,note:document.getElementById('fNote').value.trim(),
    author:currentUser?{name:currentUser.name,emoji:currentUser.emoji}:null,
    interested:[]
  });
  closeModal();save();renderItinerary();renderDrawerNav();spawnPetals(5);
}
function delAct(dayId,actId){DAYS[dayId].acts=DAYS[dayId].acts.filter(a=>a.id!==actId);save();renderItinerary();renderDrawerNav()}
document.getElementById('modalWrap').addEventListener('click',e=>{if(e.target===document.getElementById('modalWrap'))closeModal()});

/* ── INIT ── */
(async()=>{
  initWelcome();
  await loadSaved();
  renderItinerary();
  renderDrawerNav();
})();
</script>
</body>
</html>
