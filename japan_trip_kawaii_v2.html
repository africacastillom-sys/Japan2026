<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 Japón 2025 — Nuestro Viaje Kawaii</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --sakura:#FFB7C5;--sakura-dark:#E8739A;--sakura-light:#FFF0F3;
  --matcha:#5B8A5B;--matcha-light:#E8F3E8;
  --indigo:#2D3A8C;--indigo-light:#EEF0FC;
  --gold:#C9922A;--gold-light:#FDF3E3;
  --cream:#FFFAF7;--paper:#FFF8F5;
  --ink:#2A1F1A;--ink-soft:#6B5C55;--ink-faint:#B5A49D;
  --border:#EDD9D0;--r:12px;--r-sm:8px;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes spin-slow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes sakura-fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.18)}100%{transform:scale(1)}}
@keyframes slide-in{from{transform:translateX(-8px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fade-up{from{transform:translateY(6px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes bar-grow{from{width:0}to{width:var(--w)}}

body{font-family:'Noto Sans JP',sans-serif;background:var(--cream);color:var(--ink);overflow:hidden;height:100vh}
.sakura-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;overflow:hidden}
.petal{position:absolute;top:-20px;font-size:16px;animation:sakura-fall linear infinite;opacity:0;user-select:none}
.shell{display:flex;height:100vh}

/* ── SIDEBAR ── */
.sidebar{width:250px;background:var(--paper);border-right:2px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:relative;overflow:hidden}
.sidebar::before{content:'';position:absolute;bottom:0;left:0;right:0;height:120px;background:linear-gradient(to bottom,transparent,var(--sakura-light));pointer-events:none;z-index:0}
.sidebar-top{padding:18px 16px 14px;background:var(--sakura);position:relative;overflow:hidden;flex-shrink:0}
.sidebar-top::after{content:'🌸';position:absolute;right:-8px;top:-8px;font-size:52px;opacity:.18;animation:spin-slow 20s linear infinite}
.trip-name{font-family:'Zen Maru Gothic',sans-serif;font-size:18px;font-weight:700;color:var(--indigo);display:flex;align-items:center;gap:6px}
.trip-name span{animation:float 3s ease-in-out infinite}
.trip-jp{font-size:11px;color:var(--sakura-dark);margin-top:2px;letter-spacing:.1em}
.trip-meta{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.meta-pill{font-size:11px;font-weight:500;background:rgba(255,255,255,.55);color:var(--indigo);border-radius:20px;padding:2px 9px;border:1px solid rgba(255,255,255,.4)}

/* Tabs */
.sidebar-tabs{display:flex;border-bottom:2px solid var(--border);background:var(--paper);flex-shrink:0;z-index:2;position:relative}
.tab-btn{flex:1;padding:9px 4px;border:none;background:transparent;cursor:pointer;font-size:16px;transition:background .15s;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab-btn:hover{background:var(--sakura-light)}
.tab-btn.active{border-bottom:2px solid var(--sakura-dark);background:var(--sakura-light)}
.tab-btn .tab-label{font-size:9px;display:block;color:var(--ink-soft);font-family:'Noto Sans JP',sans-serif;font-weight:500;margin-top:1px}

.nav-list{flex:1;overflow-y:auto;padding:6px 8px 80px;position:relative;z-index:1}
.nav-list::-webkit-scrollbar{width:4px}
.nav-list::-webkit-scrollbar-thumb{background:var(--sakura);border-radius:4px}
.nav-section-label{font-size:10px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.1em;padding:12px 10px 4px;display:flex;align-items:center;gap:6px}
.nav-section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r-sm);cursor:pointer;margin-bottom:1px;transition:background .15s,transform .1s;animation:slide-in .25s ease both}
.nav-item:hover{background:var(--sakura-light);transform:translateX(2px)}
.nav-item.active{background:var(--sakura-light);border:1.5px solid var(--sakura)}
.nav-emoji{font-size:16px;flex-shrink:0}
.nav-num{font-size:10px;color:var(--ink-faint);min-width:20px;font-weight:500}
.nav-label{font-size:13px;color:var(--ink);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.nav-count{font-size:11px;font-weight:700;background:var(--sakura);color:var(--indigo);border-radius:20px;padding:1px 7px;min-width:22px;text-align:center}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--cream)}
.topbar{padding:14px 20px;background:var(--paper);border-bottom:2px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-day{font-family:'Zen Maru Gothic',sans-serif;font-size:22px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:8px}
.city-pill{font-size:12px;font-weight:700;padding:3px 12px;border-radius:20px;border:1.5px solid currentColor}
.topbar-date{font-size:12px;color:var(--ink-soft);margin-top:2px}
.top-actions{display:flex;gap:8px}
.add-btn{display:flex;align-items:center;gap:6px;padding:9px 16px;background:var(--sakura-dark);border:none;border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:700;color:white;font-family:'Noto Sans JP',sans-serif;transition:transform .12s,background .12s}
.add-btn:hover{background:#d4607a;transform:scale(1.03)}
.add-btn:active{transform:scale(.97)}
.weather-btn{display:flex;align-items:center;gap:5px;padding:8px 12px;background:var(--gold-light);border:1.5px solid var(--gold);border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:600;color:var(--gold);font-family:'Noto Sans JP',sans-serif;transition:transform .12s}
.weather-btn:hover{transform:scale(1.03)}
.content{flex:1;overflow-y:auto;padding:18px 20px}
.content::-webkit-scrollbar{width:6px}
.content::-webkit-scrollbar-thumb{background:var(--sakura);border-radius:4px}

/* ── FLIGHT BANNER ── */
.flight-banner{background:var(--indigo-light);border:1.5px solid var(--indigo);border-radius:var(--r);padding:16px;margin-bottom:16px;position:relative;overflow:hidden}
.flight-banner::before{content:'✈';position:absolute;right:12px;top:8px;font-size:40px;opacity:.07}
.flight-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.flight-airline-badge{font-size:12px;font-weight:700;color:white;background:var(--indigo);padding:4px 12px;border-radius:20px;display:flex;align-items:center;gap:5px}
.flight-nums{font-size:12px;color:var(--indigo);font-weight:500}
.flight-segments{display:flex;align-items:center}
.seg-airport{text-align:center;min-width:64px}
.seg-iata{font-size:24px;font-weight:700;color:var(--indigo);font-family:'Zen Maru Gothic',sans-serif}
.seg-city{font-size:10px;color:var(--ink-soft);margin-top:1px}
.seg-time{font-size:13px;font-weight:700;color:var(--ink);margin-top:4px}
.seg-connector{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:0 6px}
.seg-line{width:100%;height:1.5px;background:var(--indigo);opacity:.3}
.seg-stop-pill{font-size:10px;color:var(--indigo);font-weight:600;background:white;border:1px solid var(--indigo);border-radius:20px;padding:2px 8px;white-space:nowrap}
.flight-note{font-size:11px;color:var(--ink-soft);margin-top:12px;padding-top:10px;border-top:1px solid rgba(45,58,140,.15)}

/* ── SECTIONS ── */
.section-hd{display:flex;align-items:center;gap:8px;margin:20px 0 8px}
.section-hd:first-child{margin-top:0}
.section-hd-line{flex:1;height:1.5px;background:var(--border)}
.section-hd-label{font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;display:flex;align-items:center;gap:4px}

/* ── ACTIVITY CARDS ── */
.act-list{display:flex;flex-direction:column;gap:7px}
.act-card{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;background:white;border:1.5px solid var(--border);border-radius:var(--r);transition:border-color .15s,transform .12s;animation:fade-up .2s ease both;cursor:default}
.act-card:hover{border-color:var(--sakura);transform:translateX(2px)}
.act-time-col{display:flex;flex-direction:column;align-items:center;min-width:40px;padding-top:2px}
.act-time{font-size:12px;font-weight:700;color:var(--ink)}
.act-time-dash{font-size:14px;color:var(--ink-faint)}
.act-icon-wrap{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.act-body{flex:1}
.act-name{font-size:14px;color:var(--ink);font-weight:600;line-height:1.35}
.act-note{font-size:11px;color:var(--ink-soft);margin-top:3px;line-height:1.5}
.act-badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:700;flex-shrink:0;align-self:flex-start;margin-top:2px;border:1px solid currentColor}
.act-del{background:none;border:none;cursor:pointer;font-size:16px;line-height:1;padding:0 2px;align-self:flex-start;margin-top:2px;opacity:.3;transition:opacity .12s,transform .1s}
.act-del:hover{opacity:1;transform:scale(1.2)}

/* ── STATS ── */
.stats-row{display:flex;border-top:2px solid var(--border);background:var(--paper);flex-shrink:0}
.stat-cell{flex:1;padding:10px 8px;text-align:center;border-right:1px solid var(--border);transition:background .15s;cursor:default}
.stat-cell:last-child{border-right:none}
.stat-cell:hover{background:var(--sakura-light)}
.stat-emoji{font-size:16px}
.stat-val{font-size:17px;font-weight:700;color:var(--ink);font-family:'Zen Maru Gothic',sans-serif}
.stat-key{font-size:10px;color:var(--ink-soft);margin-top:1px;font-weight:500}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:48px 20px;color:var(--ink-soft)}
.empty-state .big{font-size:48px;margin-bottom:12px;animation:float 3s ease-in-out infinite}
.empty-state p{font-size:14px;line-height:1.6}

/* ── ADD INLINE ── */
.add-row{margin-top:8px}
.add-inline-btn{width:100%;padding:11px;background:transparent;border:2px dashed var(--sakura);border-radius:var(--r);font-size:13px;color:var(--sakura-dark);cursor:pointer;text-align:center;font-weight:600;font-family:'Noto Sans JP',sans-serif;transition:background .15s}
.add-inline-btn:hover{background:var(--sakura-light)}

/* ── WEATHER WIDGET ── */
.weather-panel{background:linear-gradient(135deg,#667eea22,#f093fb11);border:1.5px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:16px}
.weather-icon{font-size:40px;animation:float 4s ease-in-out infinite}
.weather-temp{font-size:22px;font-weight:700;font-family:'Zen Maru Gothic',sans-serif;color:var(--ink)}
.weather-desc{font-size:12px;color:var(--ink-soft);margin-top:2px}
.weather-extra{display:flex;gap:10px;margin-top:6px}
.weather-tag{font-size:11px;background:white;border:1px solid var(--border);border-radius:20px;padding:2px 8px;color:var(--ink-soft)}

/* ── MODAL ── */
.modal-wrap{position:fixed;inset:0;background:rgba(42,31,26,.4);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(3px)}
.modal-box{background:white;border:2px solid var(--sakura);border-radius:16px;padding:24px;width:380px;max-width:95vw;animation:fade-up .2s ease;position:relative;overflow:hidden}
.modal-box::before{content:'🌸';position:absolute;right:-10px;top:-10px;font-size:60px;opacity:.08;animation:spin-slow 15s linear infinite}
.modal-title{font-family:'Zen Maru Gothic',sans-serif;font-size:18px;font-weight:700;color:var(--ink);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field label{font-size:12px;font-weight:700;color:var(--ink-soft)}
.field input,.field select,.field textarea{font-size:13px;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);background:var(--cream);color:var(--ink);font-family:'Noto Sans JP',sans-serif;width:100%;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--sakura-dark)}
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:4px}
.type-option{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;border:1.5px solid var(--border);border-radius:var(--r-sm);cursor:pointer;transition:all .12s;background:var(--cream)}
.type-option:hover{border-color:var(--sakura)}
.type-option.selected{border-color:var(--sakura-dark);background:var(--sakura-light)}
.type-option .te{font-size:20px}
.type-option .tl{font-size:10px;font-weight:600;color:var(--ink-soft)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.btn-ghost{padding:9px 18px;font-size:13px;font-weight:600;background:transparent;border:1.5px solid var(--border);border-radius:var(--r-sm);cursor:pointer;color:var(--ink-soft);font-family:'Noto Sans JP',sans-serif;transition:background .12s}
.btn-ghost:hover{background:var(--cream)}
.btn-primary{padding:9px 18px;font-size:13px;font-weight:700;background:var(--sakura-dark);border:none;border-radius:var(--r-sm);cursor:pointer;color:white;font-family:'Noto Sans JP',sans-serif;transition:transform .12s,background .12s;display:flex;align-items:center;gap:5px}
.btn-primary:hover{background:#c4527a;transform:scale(1.03)}
.btn-primary:active{transform:scale(.97)}

/* ── BUDGET PANEL ── */
.panel-wrap{flex:1;overflow-y:auto;padding:14px 12px 80px;position:relative;z-index:1}
.panel-wrap::-webkit-scrollbar{width:4px}
.panel-wrap::-webkit-scrollbar-thumb{background:var(--sakura);border-radius:4px}

.budget-summary{background:var(--gold-light);border:1.5px solid var(--gold);border-radius:var(--r);padding:14px;margin-bottom:12px}
.budget-total-label{font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.08em}
.budget-total-val{font-family:'Zen Maru Gothic',sans-serif;font-size:28px;font-weight:700;color:var(--ink);margin:2px 0}
.budget-total-sub{font-size:11px;color:var(--ink-soft)}
.budget-bar-wrap{background:rgba(201,146,42,.15);border-radius:20px;height:8px;margin-top:10px;overflow:hidden}
.budget-bar{height:100%;border-radius:20px;background:var(--gold);transition:width .6s ease}

.budget-cats{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.bcat-row{display:flex;align-items:center;gap:8px;padding:9px 11px;background:white;border:1.5px solid var(--border);border-radius:var(--r-sm);cursor:default}
.bcat-emoji{font-size:16px;flex-shrink:0}
.bcat-info{flex:1}
.bcat-name{font-size:12px;font-weight:600;color:var(--ink)}
.bcat-bar-wrap{height:4px;background:#f0e8e0;border-radius:20px;margin-top:3px}
.bcat-bar{height:100%;border-radius:20px;transition:width .5s ease}
.bcat-amt{font-size:13px;font-weight:700;color:var(--ink);flex-shrink:0}
.bcat-del{background:none;border:none;cursor:pointer;font-size:13px;opacity:.25;transition:opacity .12s}
.bcat-del:hover{opacity:1}

.budget-add-form{background:var(--paper);border:1.5px dashed var(--border);border-radius:var(--r);padding:12px;margin-bottom:8px}
.budget-add-title{font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:8px}
.budget-fields{display:flex;flex-direction:column;gap:6px}
.budget-row{display:flex;gap:6px}
.b-inp{flex:1;font-size:12px;padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--r-sm);background:white;color:var(--ink);font-family:'Noto Sans JP',sans-serif;outline:none;transition:border-color .15s}
.b-inp:focus{border-color:var(--gold)}
.b-select{font-size:12px;padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--r-sm);background:white;color:var(--ink);font-family:'Noto Sans JP',sans-serif;outline:none}
.b-add-btn{padding:7px 14px;background:var(--gold);border:none;border-radius:var(--r-sm);cursor:pointer;font-size:12px;font-weight:700;color:white;font-family:'Noto Sans JP',sans-serif;transition:transform .1s;white-space:nowrap}
.b-add-btn:hover{transform:scale(1.04)}

/* ── PACKING LIST ── */
.pack-cats{display:flex;flex-direction:column;gap:10px;margin-bottom:10px}
.pack-cat-block{background:white;border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.pack-cat-hd{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;transition:background .15s}
.pack-cat-hd:hover{background:var(--sakura-light)}
.pack-cat-emoji{font-size:15px}
.pack-cat-name{font-size:13px;font-weight:700;color:var(--ink);flex:1}
.pack-cat-prog{font-size:11px;color:var(--ink-faint);font-weight:500}
.pack-cat-arrow{font-size:11px;color:var(--ink-faint);transition:transform .2s}
.pack-cat-arrow.open{transform:rotate(90deg)}
.pack-items{border-top:1px solid var(--border);padding:8px 10px;display:flex;flex-direction:column;gap:4px}
.pack-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;transition:background .12s}
.pack-item:hover{background:var(--sakura-light)}
.pack-cb{width:16px;height:16px;accent-color:var(--sakura-dark);cursor:pointer;flex-shrink:0}
.pack-item-label{font-size:13px;color:var(--ink);flex:1;cursor:pointer;transition:color .15s}
.pack-item-label.done{color:var(--ink-faint);text-decoration:line-through}
.pack-item-del{background:none;border:none;cursor:pointer;font-size:12px;opacity:.2;transition:opacity .12s}
.pack-item-del:hover{opacity:1}
.pack-add-row{display:flex;gap:6px;padding:6px 8px;border-top:1px solid var(--border)}
.pack-add-inp{flex:1;font-size:12px;padding:6px 9px;border:1.5px solid var(--border);border-radius:6px;background:var(--cream);color:var(--ink);font-family:'Noto Sans JP',sans-serif;outline:none;transition:border-color .15s}
.pack-add-inp:focus{border-color:var(--sakura-dark)}
.pack-add-btn{padding:6px 11px;background:var(--sakura-dark);border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700;color:white;font-family:'Noto Sans JP',sans-serif}
.pack-summary{background:var(--sakura-light);border:1.5px solid var(--sakura);border-radius:var(--r);padding:10px 14px;display:flex;align-items:center;gap:12px;margin-bottom:10px}
.pack-summary-emoji{font-size:24px;animation:float 3s ease-in-out infinite}
.pack-pct{font-family:'Zen Maru Gothic',sans-serif;font-size:22px;font-weight:700;color:var(--sakura-dark)}
.pack-done-str{font-size:11px;color:var(--ink-soft);margin-top:1px}
.pack-overall-bar{flex:1;height:6px;background:rgba(232,115,154,.2);border-radius:20px;overflow:hidden}
.pack-overall-fill{height:100%;background:var(--sakura-dark);border-radius:20px;transition:width .5s ease}

/* ── NOTES ── */
.notes-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.note-card{background:white;border:1.5px solid var(--border);border-radius:var(--r);padding:12px 14px;animation:fade-up .2s ease;position:relative}
.note-card:hover{border-color:var(--sakura)}
.note-card-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.note-emoji-pick{font-size:18px;cursor:pointer;user-select:none}
.note-title-inp{flex:1;font-size:13px;font-weight:700;border:none;background:transparent;color:var(--ink);font-family:'Zen Maru Gothic',sans-serif;outline:none}
.note-title-inp::placeholder{color:var(--ink-faint)}
.note-date{font-size:10px;color:var(--ink-faint);flex-shrink:0}
.note-del{background:none;border:none;cursor:pointer;font-size:14px;opacity:.25;transition:opacity .12s}
.note-del:hover{opacity:1}
.note-body-inp{width:100%;font-size:12px;border:none;background:transparent;color:var(--ink-soft);font-family:'Noto Sans JP',sans-serif;outline:none;resize:none;line-height:1.6;min-height:50px}
.note-body-inp::placeholder{color:var(--ink-faint)}
.note-day-tag{font-size:10px;padding:2px 8px;border-radius:20px;background:var(--sakura-light);color:var(--sakura-dark);border:1px solid var(--sakura);margin-top:6px;display:inline-block;cursor:pointer}
.note-add-btn{width:100%;padding:10px;background:transparent;border:2px dashed var(--border);border-radius:var(--r);font-size:13px;color:var(--ink-soft);cursor:pointer;text-align:center;font-weight:600;font-family:'Noto Sans JP',sans-serif;transition:background .15s,border-color .15s}

function spawnPetals(n=8){
  const c=document.getElementById('sakuraContainer');
  for(let i=0;i<n;i++){
    const p=document.createElement('div');p.className='petal';
    p.textContent=['🌸','🌺','🍃','🌼'][Math.floor(Math.random()*4)];
    p.style.left=Math.random()*100+'vw';p.style.fontSize=(10+Math.random()*14)+'px';
    p.style.animationDuration=(4+Math.random()*6)+'s';p.style.animationDelay=(Math.random()*3)+'s';p.style.opacity='0';
    c.appendChild(p);setTimeout(()=>p.remove(),10000+Math.random()*4000);
  }
}
spawnPetals(12);setInterval(()=>spawnPetals(3),4000);

function celebrar(){
  const emojis=['🎊','🎉','🌸','🍜','🗾','🏯','🦊','🎋','🍡','⛩️','🎴','🀄'];
  const c=document.getElementById('sakuraContainer');
  for(let i=0;i<30;i++){
    const p=document.createElement('div');p.className='petal';
    p.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    p.style.left=Math.random()*100+'vw';p.style.fontSize=(16+Math.random()*14)+'px';
    p.style.animationDuration=(2+Math.random()*3)+'s';p.style.animationDelay=(Math.random()*1.5)+'s';p.style.opacity='0';
    c.appendChild(p);setTimeout(()=>p.remove(),5000);
  }
}

    const el=document.getElementById('tab-'+t);

  });
  if(name==='budget') renderBudget();
  if(name==='packing') renderPacking();
  if(name==='notes') renderNotes();
}

let idSeq=1;
Object.entries(DA).forEach(([k,arr])=>{DAYS[+k].acts=arr.map(a=>({id:idSeq++,type:a.t,time:a.h||'',name:a.n,note:a.d||''}))});

let sel=0,showWeather=false,selectedType='visita';

/* ── BUDGET DATA ── */
const BUDGET_CAT_COLORS={'vuelos':'#2D3A8C','hoteles':'#5B8A5B','transporte':'#B05A2A','comidas':'#C9922A','visitas':'#E8739A','compras':'#7B5EA7','otros':'#888'};
const BUDGET_EMOJIS={'vuelos':'✈️','hoteles':'🏨','transporte':'🚄','comidas':'🍜','visitas':'🛕','compras':'🛍️','otros':'💡'};
let budget={
  total:9000,
  items:[
    {id:1,cat:'vuelos',name:'Vuelos Air China ×6',amount:2400},
    {id:2,cat:'hoteles',name:'Hoteles 17 noches ×6',amount:2800},
    {id:3,cat:'transporte',name:'JR Pass ×6 (14 días)',amount:1560},
    {id:4,cat:'comidas',name:'Comidas estimadas',amount:900},
    {id:5,cat:'visitas',name:'Entradas y actividades',amount:480},
    {id:6,cat:'compras',name:'Presupuesto compras',amount:600},
  ]
};
let budgetIdSeq=10;

function budgetSpent(){return budget.items.reduce((s,i)=>s+i.amount,0)}
function budgetByCat(){
  const m={};
  budget.items.forEach(i=>{if(!m[i.cat])m[i.cat]=0;m[i.cat]+=i.amount});
  return m;
}

function renderBudget(){
  const el=document.getElementById('tab-budget');
  const spent=budgetSpent();
  const pct=Math.min(100,Math.round(spent/budget.total*100));
  const catMap=budgetByCat();
  const sortedCats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const maxCat=sortedCats[0]?sortedCats[0][1]:1;

  let html=`<div class="budget-summary">
    <div class="budget-total-label">💴 Presupuesto total</div>
    <div class="budget-total-val">${spent.toLocaleString('es-ES')}€ <span style="font-size:14px;color:var(--ink-soft)">/ ${budget.total.toLocaleString('es-ES')}€</span></div>
    <div class="budget-total-sub">${pct}% del presupuesto · ${(budget.total-spent).toLocaleString('es-ES')}€ disponible</div>
    <div class="budget-bar-wrap"><div class="budget-bar" style="width:${pct}%"></div></div>
  </div>
  <div class="budget-cats">`;

  sortedCats.forEach(([cat,amt])=>{
    const pctCat=Math.round(amt/maxCat*100);
    const color=BUDGET_CAT_COLORS[cat]||'#888';
    const emoji=BUDGET_EMOJIS[cat]||'💡';
    html+=`<div class="bcat-row">
      <div class="bcat-emoji">${emoji}</div>
      <div class="bcat-info">
        <div class="bcat-name">${cat.charAt(0).toUpperCase()+cat.slice(1)}</div>
        <div class="bcat-bar-wrap"><div class="bcat-bar" style="width:${pctCat}%;background:${color}"></div></div>
      </div>
      <div class="bcat-amt">${amt.toLocaleString('es-ES')}€</div>
    </div>`;
  });

  html+=`</div>
  <div style="font-size:10px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">📋 Desglose</div>
  <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:10px">`;

  budget.items.forEach(item=>{
    const color=BUDGET_CAT_COLORS[item.cat]||'#888';
    const emoji=BUDGET_EMOJIS[item.cat]||'💡';
    html+=`<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:white;border:1.5px solid var(--border);border-radius:var(--r-sm)">
      <span style="font-size:13px">${emoji}</span>
      <span style="flex:1;font-size:12px;color:var(--ink)">${item.name}</span>
      <span style="font-size:12px;font-weight:700;color:${color}">${item.amount.toLocaleString('es-ES')}€</span>
      <button class="bcat-del" onclick="delBudgetItem(${item.id})">🗑️</button>
    </div>`;
  });

  html+=`</div>
  <div class="budget-add-form">
    <div class="budget-add-title">➕ Añadir gasto</div>
    <div class="budget-fields">
      <div class="budget-row">
        <select class="b-select" id="bCat">
          ${Object.keys(BUDGET_CAT_COLORS).map(c=>`<option value="${c}">${BUDGET_EMOJIS[c]} ${c.charAt(0).toUpperCase()+c.slice(1)}</option>`).join('')}
        </select>
        <input class="b-inp" id="bAmt" type="number" placeholder="Importe €" style="max-width:90px">
      </div>
      <div class="budget-row">
        <input class="b-inp" id="bName" type="text" placeholder="Descripción...">
        <button class="b-add-btn" onclick="addBudgetItem()">+ Añadir</button>
      </div>
    </div>
  </div>
  <div style="background:var(--indigo-light);border:1.5px solid var(--indigo);border-radius:var(--r-sm);padding:8px 10px;font-size:11px;color:var(--indigo)">
    💡 Presupuesto estimado: ~${Math.round(budget.total/6).toLocaleString('es-ES')}€ por persona para todo el viaje
  </div>`;

  el.innerHTML=html;
  document.getElementById('sBudget').textContent=spent.toLocaleString('es-ES')+'€';
}

function addBudgetItem(){
  const cat=document.getElementById('bCat').value;
  const amt=parseFloat(document.getElementById('bAmt').value);
  const name=document.getElementById('bName').value.trim();
  if(!name||isNaN(amt)||amt<=0)return;
  budget.items.push({id:budgetIdSeq++,cat,name,amount:amt});
  renderBudget();spawnPetals(3);
}
function delBudgetItem(id){
  budget.items=budget.items.filter(i=>i.id!==id);
  renderBudget();
}

function getPackTotals(){
  let total=0,done=0;
  packData.forEach(c=>{total+=c.items.length;done+=c.items.filter(i=>i.done).length});
  return{total,done};
}

function renderPacking(){
  const el=document.getElementById('tab-packing');
  const{total,done}=getPackTotals();
  const pct=total>0?Math.round(done/total*100):0;
  const msgs=['¡Empieza a preparar la maleta!','¡Buen comienzo!','¡Vas bien!','¡Casi lista!','🌸 ¡Todo listo para Japón!'];
  const msgIdx=Math.min(4,Math.floor(pct/25));

  let html=`<div class="pack-summary">
    <div class="pack-summary-emoji">${pct===100?'🎉':'🧳'}</div>
    <div>
      <div class="pack-pct">${pct}%</div>
      <div class="pack-done-str">${done}/${total} items · ${msgs[msgIdx]}</div>
    </div>
    <div class="pack-overall-bar"><div class="pack-overall-fill" style="width:${pct}%"></div></div>
  </div>
  <div class="pack-cats">`;

  packData.forEach(cat=>{
    const catDone=cat.items.filter(i=>i.done).length;
    const catPct=cat.items.length>0?Math.round(catDone/cat.items.length*100):0;
    html+=`<div class="pack-cat-block">
      <div class="pack-cat-hd" onclick="togglePackCat('${cat.id}')">
        <span class="pack-cat-emoji">${cat.name.split(' ').pop()}</span>
        <span class="pack-cat-name">${cat.name.split(' ').slice(0,-1).join(' ')}</span>
        <span class="pack-cat-prog">${catDone}/${cat.items.length}</span>
        <span class="pack-cat-arrow${cat.open?' open':''}">▶</span>
      </div>`;
    if(cat.open){
      html+=`<div class="pack-items">`;
      cat.items.forEach(item=>{
        html+=`<div class="pack-item">
          <input type="checkbox" class="pack-cb" ${item.done?'checked':''} onchange="togglePackItem('${cat.id}',${item.id})">
          <label class="pack-item-label${item.done?' done':''}" onclick="togglePackItem('${cat.id}',${item.id})">${item.label}</label>
          <button class="pack-item-del" onclick="delPackItem('${cat.id}',${item.id})">✕</button>
        </div>`;
      });
      html+=`<div class="pack-add-row">
        <input class="pack-add-inp" type="text" id="packInp_${cat.id}" placeholder="Añadir item..." onkeydown="if(event.key==='Enter')addPackItem('${cat.id}')">
        <button class="pack-add-btn" onclick="addPackItem('${cat.id}')">+</button>
      </div></div>`;
    }
    html+=`</div>`;
  });

  html+='</div>';
  el.innerHTML=html;
}

function togglePackCat(catId){
  const cat=packData.find(c=>c.id===catId);
  if(cat)cat.open=!cat.open;
  renderPacking();
}
function togglePackItem(catId,itemId){
  const cat=packData.find(c=>c.id===catId);
  if(!cat)return;
  const item=cat.items.find(i=>i.id===itemId);
  if(item){item.done=!item.done;if(item.done)spawnPetals(2);}
  renderPacking();
}
function delPackItem(catId,itemId){
  const cat=packData.find(c=>c.id===catId);
  if(cat)cat.items=cat.items.filter(i=>i.id!==itemId);
  renderPacking();
}
function addPackItem(catId){
  const inp=document.getElementById('packInp_'+catId);
  if(!inp||!inp.value.trim())return;
  const cat=packData.find(c=>c.id===catId);
  if(cat){cat.items.push({id:packIdSeq++,label:inp.value.trim(),done:false});}
  renderPacking();
}

/* ── NOTES DATA ── */
let noteIdSeq=200;
const NOTE_EMOJIS=['📌','💡','⭐','🗺️','🍜','🛕','💴','📸','🎌','🌸'];
let notes=[
  {id:noteIdSeq++,emoji:'📌',title:'Información práctica',body:'💴 1€ ≈ 160 JPY · Llevar efectivo siempre\n📶 SIM datos: Rakuten, IIJmio o au\n🚌 IC Card (Suica) funciona en todo el transporte\n🏧 7-Eleven ATM acepta tarjetas extranjeras',date:'antes del viaje',dayTag:null},

];

function formatNoteDate(d){return d||new Date().toLocaleDateString('es-ES',{day:'numeric',month:'short'})}

function renderNotes(){
  const el=document.getElementById('tab-notes');
  let html=`<div class="notes-list">`;
  notes.forEach(note=>{
    html+=`<div class="note-card">
      <div class="note-card-top">
        <span class="note-emoji-pick" onclick="cycleNoteEmoji(${note.id})" title="Cambiar emoji">${note.emoji}</span>
        <input class="note-title-inp" value="${escH(note.title)}" placeholder="Título de la nota..." oninput="updateNote(${note.id},'title',this.value)">
        <span class="note-date">${formatNoteDate(note.date)}</span>
        <button class="note-del" onclick="delNote(${note.id})">🗑️</button>
      </div>
      <textarea class="note-body-inp" rows="3" placeholder="Escribe aquí tus notas..." oninput="updateNote(${note.id},'body',this.value)">${escH(note.body)}</textarea>
      ${note.dayTag?`<span class="note-day-tag">📅 ${note.dayTag}</span>`:''}
    </div>`;
  });
  html+=`</div>
  <button class="note-add-btn" onclick="addNote()">📝 Nueva nota ✨</button>`;
  el.innerHTML=html;
}

function escH(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function addNote(){
  notes.unshift({id:noteIdSeq++,emoji:'📝',title:'',body:'',date:new Date().toLocaleDateString('es-ES',{day:'numeric',month:'short'}),dayTag:null});
  renderNotes();spawnPetals(3);
  setTimeout(()=>{const inp=document.querySelector('.note-title-inp');if(inp)inp.focus()},50);
}
function delNote(id){notes=notes.filter(n=>n.id!==id);renderNotes()}
function updateNote(id,field,val){const n=notes.find(n=>n.id===id);if(n)n[field]=val}
function cycleNoteEmoji(id){
  const n=notes.find(n=>n.id===id);
  if(!n)return;
  const idx=(NOTE_EMOJIS.indexOf(n.emoji)+1)%NOTE_EMOJIS.length;
  n.emoji=NOTE_EMOJIS[idx];
  renderNotes();
}

/* ── TYPE SELECTOR ── */
function buildTypeGrid(){
  const g=document.getElementById('typeGrid');g.innerHTML='';
  TYPE_ORDER.forEach(type=>{
    const m=TYPE_META[type];const el=document.createElement('div');
    el.className='type-option'+(type===selectedType?' selected':'');
    el.innerHTML=`<div class="te">${m.emoji}</div><div class="tl">${m.label}</div>`;
    el.onclick=()=>{selectedType=type;document.querySelectorAll('.type-option').forEach(x=>x.classList.remove('selected'));el.classList.add('selected')};
    g.appendChild(el);
  });
}

/* ── FLIGHT CARD ── */
function flightHTML(f){
  const segs=f.segs.map((s,i)=>`
    <div class="seg-airport"><div class="seg-iata">${s.from}</div><div class="seg-city">${s.fromC}</div><div class="seg-time">${s.dep}</div></div>
    <div class="seg-connector"><div class="seg-line"></div><div class="seg-stop-pill">${s.dur}</div><div class="seg-line"></div></div>
    <div class="seg-airport"><div class="seg-iata">${s.to}</div><div class="seg-city">${s.toC}</div><div class="seg-time">${s.arr}</div></div>
    ${i===0?'<div style="width:12px;flex-shrink:0"></div>':''}
  `).join('');
  return `<div class="flight-banner"><div class="flight-header"><span class="flight-airline-badge">✈️ Air China</span><span class="flight-nums">${f.nums} · ${f.date}</span></div><div class="flight-segments">${segs}</div><div class="flight-note">${f.note}</div></div>`;
}

/* ── WEATHER ── */
function weatherHTML(city){
  const w=WEATHER_BY_CITY[city]||WEATHER_BY_CITY.vuelo;
  return `<div class="weather-panel"><div class="weather-icon">${w.icon}</div><div class="weather-info"><div class="weather-temp">${w.temp}</div><div class="weather-desc">${w.desc}</div><div class="weather-extra">${w.tags.map(t=>`<span class="weather-tag">${t}</span>`).join('')}</div></div></div>`;
}

/* ── NAV ── */
function renderNav(){
  const el=document.getElementById('tab-itinerary');el.innerHTML='';
  const groups=[{label:'Vuelo ida',ids:[0]},{label:'Tokio — 7 días',ids:[1,2,3,4,5,6,7]},{label:'Kioto — 5 días',ids:[8,9,10,11]},{label:'Osaka — 5 días',ids:[12,13,14,15,16]},{label:'Vuelo vuelta',ids:[17]}];
  groups.forEach((g,gi)=>{
    const hdr=document.createElement('div');hdr.className='nav-section-label';hdr.textContent=g.label;el.appendChild(hdr);
    g.ids.forEach((i,ii)=>{
      const d=DAYS[i];const c=CITY[d.city];const item=document.createElement('div');
      item.className='nav-item'+(d.id===sel?' active':'');
      item.style.animationDelay=(gi*0.05+ii*0.03)+'s';
      const loc=i===0?'BCN → NRT':i===17?'KIX → BCN':c.label;
      const cnt=d.acts.length;
      item.innerHTML=`<span class="nav-emoji">${c.emoji}</span><span class="nav-num">D${d.num}</span><span class="nav-label">${loc}</span>${cnt?`<span class="nav-count">${cnt}</span>`:''}`;
      item.onclick=()=>{sel=d.id;render()};el.appendChild(item);
    });
  });
}

/* ── CONTENT ── */
function renderContent(){
  const d=DAYS[sel];const c=CITY[d.city];
  document.getElementById('topDay').innerHTML=`${c.emoji} Día ${d.num} <span class="city-pill" style="background:${c.bg};color:${c.tc};border-color:${c.color}66">${c.label}</span>`;
  document.getElementById('topDate').textContent=d.date.charAt(0).toUpperCase()+d.date.slice(1);
  let html='';
  if(showWeather) html+=weatherHTML(d.city);
  if(d.flight) html+=flightHTML(FLIGHTS[d.flight]);
  const sec={};d.acts.forEach(a=>{if(!sec[a.type])sec[a.type]=[];sec[a.type].push(a)});
  let hasContent=false;
  TYPE_ORDER.forEach(type=>{
    if(!sec[type])return;hasContent=true;
    html+=`<div class="section-hd"><div class="section-hd-line"></div><div class="section-hd-label">${SECTION_LABELS[type]}</div><div class="section-hd-line"></div></div><div class="act-list">`;
    sec[type].forEach((a,ai)=>{
      const m=TYPE_META[a.type]||TYPE_META.visita;
      html+=`<div class="act-card" style="animation-delay:${ai*0.04}s">
        <div class="act-time-col">${a.time?`<div class="act-time">${a.time}</div>`:`<div class="act-time-dash">—</div>`}</div>
        <div class="act-icon-wrap" style="background:${m.bg}">${m.emoji}</div>
        <div class="act-body"><div class="act-name">${a.name}</div>${a.note?`<div class="act-note">${a.note}</div>`:''}</div>
        <span class="act-badge" style="background:${m.bg};color:${m.color};border-color:${m.color}55">${m.emoji} ${m.label}</span>
        <button class="act-del" onclick="delAct(${d.id},${a.id})" title="Eliminar">🗑️</button>
      </div>`;
    });
    html+='</div>';
  });
  if(!d.flight&&!hasContent){html+=`<div class="empty-state"><div class="big">🎋</div><p>Este día está libre como el viento...<br>¡Pulsa <strong>✨ Añadir</strong> para planificarlo!</p></div>`;}
  html+=`<div class="add-row"><button class="add-inline-btn" onclick="openModal()">✨ Añadir actividad para este día ✨</button></div>`;
  document.getElementById('content').innerHTML=html;
  let total=0;DAYS.forEach(d=>total+=d.acts.length);
  document.getElementById('sAct').textContent=total;
  document.getElementById('sBudget').textContent=budgetSpent().toLocaleString('es-ES')+'€';
}

function render(){renderNav();renderContent();}
function toggleWeather(){showWeather=!showWeather;renderContent()}
function openModal(){
  selectedType='visita';
  document.getElementById('fTime').value='';document.getElementById('fName').value='';document.getElementById('fNote').value='';
  buildTypeGrid();document.getElementById('modalWrap').classList.remove('hidden');
}
function closeModal(){document.getElementById('modalWrap').classList.add('hidden')}
function saveAct(){
  const name=document.getElementById('fName').value.trim();if(!name)return;
  DAYS[sel].acts.push({id:idSeq++,type:selectedType,time:document.getElementById('fTime').value.trim(),name,note:document.getElementById('fNote').value.trim()});
  closeModal();render();spawnPetals(5);
}
function delAct(dayId,actId){DAYS[dayId].acts=DAYS[dayId].acts.filter(a=>a.id!==actId);render()}
document.getElementById('modalWrap').addEventListener('click',e=>{if(e.target===document.getElementById('modalWrap'))closeModal()});

render();
</script>
